<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <style>
    .cursor { animation: blink 1.05s steps(1, end) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .word { animation: appear 0.6s ease-out both; }
    @keyframes appear { from { opacity: 0; transform: translateY(2px); } }
  </style>
  <rect width="1280" height="320" fill="#0a0a0a"/>

  <!-- tiny L mark, top-left -->
  <g fill="#fafafa" transform="translate(56, 48)">
    <rect width="6" height="40"/>
    <rect y="34" width="26" height="6"/>
  </g>
  <text x="92" y="80" font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="13" letter-spacing="0.5" fill="#5a5a5a">~/lucid-softworks</text>

  <!-- centered wordmark -->
  <text class="word" x="640" y="172" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="42" font-weight="500" letter-spacing="-0.5" fill="#fafafa"
       >lucid softworks<tspan dx="8" class="cursor" fill="#fafafa">▊</tspan></text>

  <!-- tagline -->
  <text x="640" y="208" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="12" letter-spacing="2" fill="#5a5a5a">// quiet tools</text>

  <!-- bottom-right meta -->
  <text x="1224" y="280" text-anchor="end"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="11" letter-spacing="0.5" fill="#5a5a5a">[ MIT  ·  est. 2026 ]</text>
</svg>
